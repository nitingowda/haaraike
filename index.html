<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Memories ❤️</title>

<style>
body{
    margin:0;
    font-family: Georgia, serif;
    color:white;
    text-align:center;

    /* romantic background */
    background: radial-gradient(circle at center, #3b1d2a, #0f0f0f);
}

h1{
    margin-top:20px;
    font-size:28px;
}

.message{
    margin:10px 20px;
    font-size:18px;
    line-height:1.6;
}

/* slideshow */
.slideshow{
    position:relative;
    width:95%;
    height:65vh;
    margin:20px auto;
    border-radius:15px;
    overflow:hidden;

    /* SOFT ROMANTIC SIDES */
    background:
      linear-gradient(to right,
        rgba(255,105,135,0.25),
        rgba(0,0,0,0.15) 25%,
        rgba(0,0,0,0.15) 75%,
        rgba(255,105,135,0.25)
      );

    display:flex;
    align-items:center;
    justify-content:center;
}

/* image */
.slide{
    position:absolute;
    max-width:100%;
    max-height:100%;
    opacity:0;
    transition:opacity 1s ease-in-out;
    border-radius:10px;

    box-shadow:0 0 40px rgba(255,120,150,0.4);
}

.slide.active{
    opacity:1;
}

button{
    padding:10px 18px;
    font-size:16px;
    margin:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:white;
    color:#333;
}
</style>
</head>

<body>

<h1>Happy Valentine's Day ನನ್ನೊಲವೇ ❤️</h1>

<div class="message">
ನಿನ್ನ ಕಂಗಳ ನೋಟದಲಿ<br>
ಬೆಳಗುತಿದೆ ಎನ್ನುಸಿರೆಂಬ ದೀವಿಗೆ<br>
ಆರದದು ಎಂದಿಗೂ,<br>
ನಿನ್ನೊಲವೆಂಬ ಸುದೆಯ ಎರಕವಿರಲು ❤️
</div>

<div class="slideshow">
    <img class="slide active" src="silout.jpg">
    <img class="slide" src="propose.jpg">
    <img class="slide" src="jump.jpg">
    <img class="slide" src="pair.jpg">
    <img class="slide" src="snow.jpg">
    <img class="slide" src="piono.jpg">
    <img class="slide" src="maduve.jpg">
</div>

<div>
    <button onclick="pauseSlides()">ನಿಲ್ಸು ಪೋಟೋವಾ ⏸️</button>
    <button onclick="startSlides()">ಓಡ್ಸು ಪೋಟೋವಾ ▶️</button>
</div>

<audio id="bgMusic" src="usiru.mp3"></audio>

<div>
    <button onclick="playMusic()">ಹಾಡು ಕೇಳೆ 🎵</button>
</div>

<script>
var slides = document.getElementsByClassName("slide");
var index = 0;
var timeoutId = null;
var music = document.getElementById("bgMusic");

/* slide change */
function nextSlide(){
    slides[index].classList.remove("active");
    index = (index + 1) % slides.length;
    slides[index].classList.add("active");

    timeoutId = setTimeout(nextSlide, 2000);
}

/* PLAY EVERYTHING */
function startSlides(){
    pauseSlides(); // stop old

    timeoutId = setTimeout(nextSlide, 2000);

    if(music){
        music.play();
    }

    console.log("PLAY");
}

/* PAUSE EVERYTHING */
function pauseSlides(){
    clearTimeout(timeoutId);
    timeoutId = null;

    if(music){
        music.pause();
    }

    console.log("PAUSE");
}

/* MUSIC BUTTON */
function playMusic(){
    if(music){
        music.play();
    }
}

/* auto start slideshow (without music) */
timeoutId = setTimeout(nextSlide, 2000);
</script>

</body>
</html>

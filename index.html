<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> ಮೇಗನ </title>

<style>
body{
    margin:0;
    font-family: Georgia, serif;
    color:white;
    text-align:center;
    background: radial-gradient(circle at center, #3b1d2a, #0f0f0f);
    overflow:hidden;
}

h1{
    margin-top:20px;
    font-size:28px;
}

.message{
    margin:10px 20px;
    font-size:18px;
    line-height:1.6;
}

/* container */
.slideshow{
    width:95%;
    height:65vh;
    margin:20px auto;
    border-radius:15px;
    overflow:hidden;

    display:flex;
    align-items:center;
    justify-content:center;

    background:
      linear-gradient(to right,
        rgba(255,105,135,0.25),
        rgba(0,0,0,0.15) 25%,
        rgba(0,0,0,0.15) 75%,
        rgba(255,105,135,0.25)
      );
}

/* iframe */
iframe{
    width:100%;
    height:100%;
    border:none;
    border-radius:10px;
}

/* floating hearts */
.heart {
    position: fixed;
    bottom: -20px;
    font-size: 20px;
    animation: floatUp linear infinite;
    opacity: 0.7;
}

@keyframes floatUp {
    0% {
        transform: translateY(0) scale(1);
        opacity: 0.7;
    }
    100% {
        transform: translateY(-110vh) scale(1.5);
        opacity: 0;
    }
}
</style>
</head>

<body>

<h1> ❤️ ಹುಟ್ಟು ಹಬ್ಬದ ನಲ್ಮೆಯ ಹಾರಯ್ಕೆಗಳು ❤️</h1>

<div class="message">
💛❤️
</div>

<div class="slideshow">
    <iframe
        src="https://drive.google.com/file/d/1qm34Sk7UVoeMKRJNWYSQrKXKfjMaAw7g/preview"
        allow="autoplay">
    </iframe>
</div>

<script>
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (3 + Math.random() * 3) + "s";
    heart.style.fontSize = (15 + Math.random() * 20) + "px";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 6000);
}

setInterval(createHeart, 500);
</script>

</body>
</html>

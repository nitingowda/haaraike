<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> ಮೇಗನ </title>

<style>
body{
    margin:0;
    font-family: Georgia, serif;
    color:white;
    text-align:center;
    background: radial-gradient(circle at center, #3b1d2a, #0f0f0f);
}

/* heading */
h1{
    margin-top:20px;
    font-size:28px;
}

/* message */
.message{
    margin:10px 20px;
    font-size:18px;
    line-height:1.6;
}

/* video container */
.slideshow{
    position:relative;
    width:95%;
    height:70vh;
    margin:20px auto;
    border-radius:15px;
    overflow:hidden;

    display:flex;
    align-items:center;
    justify-content:center;

    background: #000;
}

/* blurred background */
.bg-blur{
    position:absolute;
    width:100%;
    height:100%;
    background-image:url('https://drive.google.com/thumbnail?id=14qSCV2pJMdA9XHyu2Nj9oMHKC0vCJToy');
    background-size:cover;
    background-position:center;
    filter: blur(40px) brightness(0.5);
    transform: scale(1.2);
}

/* video wrapper */
.video-wrapper{
    position:relative;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:2;
}

/* iframe FIX */
iframe{
    height:100%;
    width:auto;              /* KEY FIX */
    max-width:100%;
    border:none;
    border-radius:10px;
}

/* floating emoji */
.heart {
    position: fixed;
    bottom: -20px;
    font-size: 20px;
    animation: floatUp linear infinite;
    opacity: 0.8;
}

@keyframes floatUp {
    0% {
        transform: translateY(0);
        opacity: 1;
    }
    100% {
        transform: translateY(-110vh);
        opacity: 0;
    }
}
</style>
</head>

<body>

<h1> 💛 ಹುಟ್ಟು ಹಬ್ಬದ ನಲ್ಮೆಯ ಹಾರಯ್ಕೆಗಳು ಮೇಗನ ❤️</h1>

<div class="message">
💛❤️
</div>

<div class="slideshow">

    <!-- blurred background -->
    <div class="bg-blur"></div>

    <!-- video -->
    <div class="video-wrapper">
        <iframe
            src="https://drive.google.com/file/d/14qSCV2pJMdA9XHyu2Nj9oMHKC0vCJToy/preview"
            allow="autoplay">
        </iframe>
    </div>

</div>

<script>
const emojis = ["❤️","💛","💖","🌸","✨","💫"];

function createHeart() {
    const el = document.createElement("div");
    el.className = "heart";

    el.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];

    el.style.left = Math.random() * 100 + "vw";
    el.style.animationDuration = (3 + Math.random() * 3) + "s";
    el.style.fontSize = (16 + Math.random() * 20) + "px";

    document.body.appendChild(el);

    setTimeout(() => el.remove(), 6000);
}

setInterval(createHeart, 600);
</script>

</body>
</html>

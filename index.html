<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Memories ❤️</title>

<style>
body{
    margin:0;
    font-family: Georgia, serif;
    color:white;
    text-align:center;

    background: radial-gradient(circle at center, #3b1d2a, #0f0f0f);
}

h1{
    margin-top:20px;
    font-size:28px;
}

.message{
    margin:10px 20px;
    font-size:18px;
    line-height:1.6;
}

/* video container */
.slideshow{
    width:95%;
    height:65vh;
    margin:20px auto;
    border-radius:15px;
    overflow:hidden;

    display:flex;
    align-items:center;
    justify-content:center;

    background:
      linear-gradient(to right,
        rgba(255,105,135,0.25),
        rgba(0,0,0,0.15) 25%,
        rgba(0,0,0,0.15) 75%,
        rgba(255,105,135,0.25)
      );
}

/* video styling */
video{
    max-width:100%;
    max-height:100%;
    border-radius:10px;
    box-shadow:0 0 40px rgba(255,120,150,0.4);
}

button{
    padding:10px 18px;
    font-size:16px;
    margin:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:white;
    color:#333;
}
</style>
</head>

<body>

<h1>Happy Valentine's Day ನನ್ನೊಲವೇ ❤️</h1>

<div class="message">
ನಿನ್ನ ಕಂಗಳ ನೋಟದಲಿ<br>
ಬೆಳಗುತಿದೆ ಎನ್ನುಸಿರೆಂಬ ದೀವಿಗೆ<br>
ಆರದದು ಎಂದಿಗೂ,<br>
ನಿನ್ನೊಲವೆಂಬ ಸುದೆಯ ಎರಕವಿರಲು ❤️
</div>

<div class="slideshow">
    <!-- YOUR VIDEO -->
    <video id="myVideo">
        <source src="love.mp4" type="video/mp4">
    </video>
</div>

<div>
    <button onclick="pauseVideo()">ನಿಲ್ಸು ⏸️</button>
    <button onclick="playVideo()">ಓಡ್ಸು ▶️</button>
</div>

<script>
var video = document.getElementById("myVideo");

function playVideo(){
    video.play();
}

function pauseVideo(){
    video.pause();
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Memories ❤️</title>

<style>
body{
    margin:0;
    font-family: Georgia, serif;
    color:white;
    text-align:center;
    background: radial-gradient(circle at center, #3b1d2a, #0f0f0f);
}

h1{
    margin-top:20px;
    font-size:28px;
}

.message{
    margin:10px 20px;
    font-size:18px;
    line-height:1.6;
}

/* container */
.slideshow{
    position:relative;
    width:95%;
    height:65vh;
    margin:20px auto;
    border-radius:15px;
    overflow:hidden;

    display:flex;
    align-items:center;
    justify-content:center;

    background:
      linear-gradient(to right,
        rgba(255,105,135,0.25),
        rgba(0,0,0,0.15) 25%,
        rgba(0,0,0,0.15) 75%,
        rgba(255,105,135,0.25)
      );
}

/* iframe */
iframe{
    width:100%;
    height:100%;
    border:none;
    display:none;
}

/* overlay button */
.overlay{
    position:absolute;
    display:flex;
    align-items:center;
    justify-content:center;
    width:100%;
    height:100%;
}

.playBtn{
    padding:15px 25px;
    font-size:18px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:white;
    color:#333;
    box-shadow:0 0 20px rgba(255,120,150,0.4);
}
</style>
</head>

<body>

<h1>Happy Valentine's Day ನನ್ನೊಲವೇ ❤️</h1>

<div class="message">
ನಿನ್ನ ಕಂಗಳ ನೋಟದಲಿ<br>
ಬೆಳಗುತಿದೆ ಎನ್ನುಸಿರೆಂಬ ದೀವಿಗೆ<br>
ಆರದದು ಎಂದಿಗೂ,<br>
ನಿನ್ನೊಲವೆಂಬ ಸುದೆಯ ಎರಕವಿರಲು ❤️
</div>

<div class="slideshow">

    <!-- PLAY BUTTON -->
    <div class="overlay" id="overlay">
        <button class="playBtn" onclick="startVideo()">
            ▶️ Video ನೋಡು ❤️
        </button>
    </div>

    <!-- GOOGLE DRIVE VIDEO -->
    <iframe id="videoFrame"
        src=""
        allow="autoplay">
    </iframe>

</div>

<script>
function startVideo(){
    var frame = document.getElementById("videoFrame");
    var overlay = document.getElementById("overlay");

    // PUT YOUR GOOGLE DRIVE FILE ID HERE
    var fileId = "YOUR_FILE_ID";

    frame.src = "https://drive.google.com/file/d/1qm34Sk7UVoeMKRJNWYSQrKXKfjMaAw7g/view?usp=drive_link/" + fileId + "/preview";
    frame.style.display = "block";
    overlay.style.display = "none";
}
</script>

</body>
</html>
